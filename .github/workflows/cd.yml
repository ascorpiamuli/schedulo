name: CD

# Trigger workflow on push to main branch only
on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allow manual trigger

jobs:
  docker-deploy:
    runs-on: ubuntu-latest
    
    # Set environment variables for the job
    env:
      DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/schedulo
      DOCKER_TAG: latest

    steps:
      # 1️⃣ Checkout the repository - UPDATED TO V4
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Log in to Docker Hub - UPDATED TO V3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Set up Docker Buildx - UPDATED TO V3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4️⃣ Build and push Docker image with all build args
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          build-args: |
            VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}
            VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}
            VITE_GEMINI_MODEL=${{ secrets.VITE_GEMINI_MODEL }}
            VITE_GEMINI_BASE_URL=${{ secrets.VITE_GEMINI_BASE_URL }}

      # 5️⃣ Deploy to your server via SSH
      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 2m
          command_timeout: 15m
          debug: false
          script: |
            # Color codes for output
            RED='\033[0;31m'
            GREEN='\033[0;32m'
            YELLOW='\033[1;33m'
            NC='\033[0m'
            
            echo -e "${YELLOW}🔹 Starting deployment on server...${NC}"
            
            # Set error handling
            set -e
            
            # Function to print status
            print_status() {
              echo -e "${GREEN}✅ $1${NC}"
            }
            
            print_error() {
              echo -e "${RED}❌ $1${NC}"
            }
            
            # Navigate to project directory
            cd /home/dockeruser/schedulo || {
              print_error "Failed to navigate to project directory"
              exit 1
            }
            
            # Pull the latest Docker image (quiet mode)
            echo "📥 Pulling latest Docker image..."
            docker pull ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} --quiet
            print_status "Image pulled successfully"
            
            # Stop and remove existing container if any exists
            echo "🛑 Stopping existing container..."
            docker compose down --remove-orphans || true
            print_status "Container stopped"
            
            # Remove old images to save space
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            print_status "Cleanup completed"
            
            # Start container in detached mode with quiet output
            echo "▶ Starting container..."
            docker compose up -d --quiet-pull
            print_status "Container started"
            
            # Wait for container to be ready
            echo "⏳ Waiting for container to be ready..."
            sleep 5
            
            # Check if container is running
            if docker compose ps | grep -q "Up"; then
              print_status "Container is running"
            else
              print_error "Container failed to start"
              docker compose logs --tail=50
              exit 1
            fi
            
            # Show running containers (brief)
            echo -e "${YELLOW}📊 Running containers:${NC}"
            docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
            
            # REMOVED: Health check section
            
            echo -e "${GREEN}🎉 Deployment completed successfully!${NC}"

      # 6️⃣ Notify on success/failure (optional)
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
name: CI

on:
  push:
    branches: ["main", "dev", "staging"]
  pull_request:
    branches: ["main", "dev", "staging"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code - updated to v4
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js - updated to v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Cache node_modules - updated to v4
      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Type check (if using TypeScript)
      - name: Type check
        run: npx tsc --noEmit || echo "Type check skipped"

      # Run lint
      - name: Run lint
        run: npm run lint || echo "No lint script defined"

      # Run tests
      - name: Run tests
        run: npm test || echo "No test script defined"

      # Build project with environment variables from secrets (for testing)
      - name: Build
        env:
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_MODEL: ${{ secrets.VITE_GEMINI_MODEL }}
          VITE_GEMINI_BASE_URL: ${{ secrets.VITE_GEMINI_BASE_URL }}
        run: |
          echo "🔨 Building project..."
          npm run build --silent
          echo "✅ Build completed successfully"

      # Upload build artifacts - updated to v4 with additional options
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7
          if-no-files-found: warn
          compression-level: 6
          overwrite: true